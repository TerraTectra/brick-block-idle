<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Брик Блок Idle v0.11-unified</title>
    <link rel="stylesheet" href="./site.css" />
    <link rel="stylesheet" href="./site-tabs.css" />
    <link rel="stylesheet" href="./site-upgrades.css" />
    <link rel="stylesheet" href="./site-evolution.css" />
    <link rel="stylesheet" href="./site-meta.css" />
    <link rel="stylesheet" href="./site-stats.css" />
    <link rel="stylesheet" href="./site-bosses.css" />
    <link rel="stylesheet" href="./site-archetype.css" />
    <link rel="stylesheet" href="./site-unlimited.css" />
    <link rel="stylesheet" href="./site-version.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <header class="head">
          <span class="tag">BRICK BLOCK IDLE</span>
          <h1>Брик Блок Idle</h1>
          <p>Автозачистка блоков, бесконечная прокачка шаров, боссы и архетипы.</p>
          <span class="version-badge">Версия игры: <b>v0.11-unified</b> · test speed x5</span>
        </header>
        <div class="controls">
          <button id="pauseBtn" class="control">Пауза</button>
          <button id="resetBtn" class="control danger">Сброс</button>
        </div>
        <canvas id="game" width="1120" height="720"></canvas>
      </section>
      <aside class="side">
        <section class="card">
          <div class="tabs">
            <button class="tab-btn active" data-tab="combat">Бой</button>
            <button class="tab-btn" data-tab="growth">Прокачка</button>
            <button class="tab-btn" data-tab="collection">Шары</button>
            <button class="tab-btn" data-tab="system">Система</button>
          </div>
        </section>
        <section class="card" data-tab-panel="combat">
          <h2>Бой</h2>
          <div class="grid">
            <div class="stat"><small>Этап</small><b id="level">1</b></div>
            <div class="stat"><small>HP блока</small><b id="hp">1</b></div>
            <div class="stat"><small>Блоков</small><b id="count">0</b></div>
            <div class="stat"><small>Осколки</small><b id="frags">0</b></div>
          </div>
          <div id="bosses" class="log"></div>
          <div id="stats" class="log"></div>
        </section>
        <section class="card" data-tab-panel="growth">
          <h2>Прокачка</h2>
          <div id="upgrades" class="log upgrade-wrap"></div>
          <div id="archetype" class="log"></div>
          <div id="unlimited" class="log"></div>
          <div id="meta" class="log"></div>
        </section>
        <section class="card" data-tab-panel="collection">
          <h2>Шары и блоки</h2>
          <div id="balls" class="log"></div>
          <div id="types" class="log"></div>
        </section>
        <section class="card" data-tab-panel="system">
          <h2>Система</h2>
          <div id="log" class="log"></div>
        </section>
      </aside>
    </main>
    <script src="./site-speed-guard.js?v=4"></script>
    <script src="./site-object-unlimiter.js?v=1"></script>
    <script src="./site-app-v10.js?v=10"></script>
    <script src="./site-bosses.js?v=1"></script>
    <script src="./site-archetype.js?v=1"></script>
    <script src="./site-unlimited.js?v=1"></script>
    <script src="./site-stats.js?v=1"></script>
    <script src="./site-tabs.js"></script>
  </body>
</html>

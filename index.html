<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Брик Блок Idle</title>
    <link rel="stylesheet" href="./site.css" />
    <link rel="stylesheet" href="./site-tabs.css" />
    <link rel="stylesheet" href="./site-upgrades.css" />
    <link rel="stylesheet" href="./site-evolution.css" />
    <link rel="stylesheet" href="./site-meta.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <header class="head">
          <span class="tag">BRICK BLOCK IDLE</span>
          <h1>Брик Блок Idle</h1>
          <p>Автозачистка блоков, прокачка шаров, эволюции и новые типы блоков.</p>
        </header>
        <div class="controls">
          <button id="pauseBtn" class="control">Пауза</button>
          <button id="resetBtn" class="control danger">Сброс</button>
        </div>
        <canvas id="game" width="1120" height="720"></canvas>
      </section>
      <aside class="side">
        <section class="card">
          <div class="tabs">
            <button class="tab-btn active" data-tab="summary">Сводка</button>
            <button class="tab-btn" data-tab="upgrades">Улучшения</button>
            <button class="tab-btn" data-tab="balls">Шары</button>
            <button class="tab-btn" data-tab="blocks">Блоки</button>
            <button class="tab-btn" data-tab="meta">Мета</button>
            <button class="tab-btn" data-tab="log">Журнал</button>
          </div>
        </section>
        <section class="card" data-tab-panel="summary">
          <h2>Сектор</h2>
          <div class="grid">
            <div class="stat"><small>Этап</small><b id="level">1</b></div>
            <div class="stat"><small>HP блока</small><b id="hp">1</b></div>
            <div class="stat"><small>Блоков</small><b id="count">0</b></div>
            <div class="stat"><small>Осколки</small><b id="frags">0</b></div>
          </div>
        </section>
        <section class="card" data-tab-panel="upgrades"><h2>Улучшения</h2><div id="upgrades" class="log upgrade-wrap"></div></section>
        <section class="card" data-tab-panel="balls"><h2>Шары</h2><div id="balls" class="log"></div></section>
        <section class="card" data-tab-panel="blocks"><h2>Типы блоков</h2><div id="types" class="log"></div></section>
        <section class="card" data-tab-panel="meta"><h2>Мета-прогрессия</h2><div id="meta" class="log"></div></section>
        <section class="card" data-tab-panel="log"><h2>Журнал</h2><div id="log" class="log"></div></section>
      </aside>
    </main>
    <script src="./site-app-v9.js?v=9"></script>
    <script src="./site-tabs.js"></script>
    <script src="./site-v9-1-integrated.js?v=9.1"></script>
  </body>
</html>
